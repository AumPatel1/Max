# Server Configuration
server.port=8080

# Application Configuration
spring.application.name=matching-engine

# Logging Configuration
logging.level.org.example.matching=DEBUG
logging.level.org.springframework.web=INFO

# Jackson Configuration (for JSON serialization)
spring.jackson.serialization.indent-output=true

# ── Neon PostgreSQL ──────────────────────────────────────────────────────────
# Paste your Neon connection string from: neon.tech → your project → Connection Details
spring.datasource.url=jdbc:postgresql://YOUR_NEON_HOST/YOUR_DB_NAME?sslmode=require
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update = creates tables automatically on first run, then alters if schema changes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Neon requires SSL; this passes it through Hibernate's connection
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
